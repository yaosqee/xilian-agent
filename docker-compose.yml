# docker-compose.yml
# 阶段 0：仅 ChromaDB（Redis 阶段 6 再加）
version: "3.8"

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: xilian-chromadb
    ports:
      - "8001:8000"
    volumes:
      - ./chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
